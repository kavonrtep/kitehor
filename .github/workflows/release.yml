name: release

# Fires on annotated/lightweight tag pushes matching a version pattern.
# `workflow_dispatch` lets us re-run a build against an existing tag
# without re-tagging (e.g. after fixing a downstream issue).
on:
  push:
    tags: ['[0-9]+.[0-9]+.[0-9]+*']
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to build (e.g. 0.1.0). Must already exist.'
        required: true

permissions:
  contents: write   # to create the GitHub Release

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  CARGO_TERM_COLOR: always
  BINARY: kitehor

jobs:
  # ─────────────────────────────────────────────────────────────────────
  # 1. Fast fail: tag must equal Cargo.toml package version.
  # ─────────────────────────────────────────────────────────────────────
  version-check:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      tag: ${{ steps.tag.outputs.tag }}
    steps:
      - uses: actions/checkout@v4
      - name: Resolve tag
        id: tag
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "tag=${{ github.event.inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          fi
      - name: Assert tag matches Cargo.toml
        run: |
          # First `version = "..."` in Cargo.toml is the [package] one.
          # `\nversion` anchors to start-of-line so `rust-version` does
          # not match.
          V=$(grep -m1 -E '^version[[:space:]]*=' Cargo.toml \
              | sed -E 's/.*"([^"]+)".*/\1/')
          T="${{ steps.tag.outputs.tag }}"
          if [ "$V" != "$T" ]; then
            echo "::error::Cargo.toml version ($V) != tag ($T)"
            exit 1
          fi
          echo "tag matches Cargo.toml: $V"

  # ─────────────────────────────────────────────────────────────────────
  # 2. Build a release binary per target. Matrix runs on the same
  # ubuntu-latest runner; gnu uses the host toolchain, musl pulls in
  # musl-tools for static linking.
  # ─────────────────────────────────────────────────────────────────────
  build:
    needs: version-check
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        target:
          - x86_64-unknown-linux-gnu
          - x86_64-unknown-linux-musl
    steps:
      - uses: actions/checkout@v4

      - name: Install pinned toolchain + cross target
        run: |
          rustup show
          rustup target add ${{ matrix.target }}
          rustc --version
          cargo --version

      - name: Install musl-tools
        if: matrix.target == 'x86_64-unknown-linux-musl'
        run: sudo apt-get install -y musl-tools

      - uses: Swatinem/rust-cache@v2
        with:
          prefix-key: v1
          shared-key: ${{ runner.os }}-rust-${{ matrix.target }}

      - name: cargo build --release --target ${{ matrix.target }}
        run: cargo build --release --locked --target ${{ matrix.target }}

      - name: Strip + tarball
        run: |
          TAG="${{ needs.version-check.outputs.tag }}"
          TARGET="${{ matrix.target }}"
          BIN_DIR="target/${TARGET}/release"
          # Strip if possible. Static musl binaries may already be
          # stripped or refuse `strip` outright; ignore failures.
          strip "${BIN_DIR}/${BINARY}" || true

          mkdir -p dist
          OUT="dist/${BINARY}-${TAG}-${TARGET}.tar.gz"
          # Tarball layout:
          #   kitehor          (the binary)
          #   LICENSE-MIT
          #   LICENSE-APACHE
          #   README.md
          tar -czvf "$OUT" \
              -C "${BIN_DIR}" "${BINARY}" \
              -C "$GITHUB_WORKSPACE" \
                  LICENSE-MIT LICENSE-APACHE README.md
          ls -lh "$OUT"
          sha256sum "$OUT" > "${OUT}.sha256"

      - uses: actions/upload-artifact@v4
        with:
          name: dist-${{ matrix.target }}
          path: |
            dist/*.tar.gz
            dist/*.sha256
          retention-days: 7

  # ─────────────────────────────────────────────────────────────────────
  # 3. Publish the GitHub Release with both tarballs + a combined
  # SHA256SUMS file. Auto-generated release notes from the merge log.
  # ─────────────────────────────────────────────────────────────────────
  publish:
    needs: [version-check, build]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Flatten + combine SHA256SUMS
        run: |
          mkdir -p dist
          find artifacts -name '*.tar.gz' -exec cp {} dist/ \;
          : > dist/SHA256SUMS
          for f in artifacts/*/*.sha256; do
            # rewrite path to just the basename, drop intermediate dirs
            sed -E 's|^([0-9a-f]+)  .*/([^/]+)|\1  \2|' "$f" >> dist/SHA256SUMS
          done
          ls -la dist/

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ needs.version-check.outputs.tag }}"
          gh release create "$TAG" \
              --title "$TAG" \
              --generate-notes \
              --verify-tag \
              dist/*.tar.gz dist/SHA256SUMS
