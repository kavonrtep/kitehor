{# -----------------------------------------------------------------
 # Version is parsed from a copy of the repo-root Cargo.toml that the
 # CI workflow drops into this recipe directory before invoking
 # conda-build (`cp Cargo.toml conda/kitehor/Cargo.toml`). The same step
 # works manually for local builds.
 #
 # `\nversion` anchors to start-of-line so `rust-version = "..."` later
 # in the file does not match.
 # ----------------------------------------------------------------- #}
{% set m = load_file_regex(load_file='Cargo.toml',
                           regex_pattern='\\nversion\\s*=\\s*"([^"]+)"',
                           from_recipe_dir=True) %}
{% set version = m.group(1) if m else '0.0.0.dev' %}

package:
  name: kitehor
  version: {{ version }}

source:
  # Build from the checked-out source tree. CI checks out at the tag
  # and the build consumes that tree; no URL/sha256 needed.
  path: ../..

build:
  number: 0
  script:
    # `cargo install --locked` enforces the committed Cargo.lock.
    # `--no-track` skips writing $PREFIX/.crates.toml + .crates2.json
    # (would pollute the env's metadata).
    # `--bin kitehor` only installs the binary, not other workspace
    # members.
    # `--path .` builds the current crate (root of the source tree).
    - cargo install --locked --no-track --bin kitehor --root $PREFIX --path .

requirements:
  build:
    - {{ stdlib('c') }}
    - {{ compiler('c') }}
    - {{ compiler('rust') }}

test:
  commands:
    # Version pin: ensures the binary in the package reports the
    # version we built it for (catches stale lockfile / wrong checkout).
    - kitehor --version | grep -F "{{ version }}"
    - kitehor --help | grep -qi 'kitehor'
    - kitehor kite-periodicity --help | grep -qi 'classify'
    # End-to-end functional smoke: simulate a tiny k=3 HOR and
    # classify it. Exercises the simulator + kite + feature pipeline
    # + baked-in classifier + verdict logic in one go.
    - kitehor simulate --monomer-size 100 --multiplicity 3 --copies 80
        --sub-rate-intra 0.10 --sub-rate-inter 0.05 --seed 7
        -o smoke.fa
    - kitehor kite-periodicity smoke.fa -o smoke.tsv
        --classify --no-hor-call
    - test -s smoke.tsv
    - grep -E "^sim_0000\\s" smoke.tsv

about:
  home: https://github.com/kavonrtep/kitehor
  dev_url: https://github.com/kavonrtep/kitehor
  doc_url: https://github.com/kavonrtep/kitehor#readme
  license: MIT OR Apache-2.0
  license_file:
    - LICENSE-MIT
    - LICENSE-APACHE
  summary: >
    Kite-first probabilistic Higher-Order Repeat (HOR) detector for
    tandem-repeat array FASTA sequences. Sequence-agnostic: no monomer
    consensus, no species library, no neural network.

extra:
  recipe-maintainers:
    - kavonrtep
