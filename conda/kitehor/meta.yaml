{# -----------------------------------------------------------------
 # Version comes from the CI workflow's `KITEHOR_VERSION` env var
 # (set from the parsed tag); defaults to "0.0.0.dev" for ad-hoc
 # local builds. Mirrors the pattern dottir's recipe uses.
 # ----------------------------------------------------------------- #}
{% set version = environ.get("KITEHOR_VERSION", "0.0.0.dev") %}

package:
  name: kitehor
  version: {{ version }}

source:
  # Build from the checked-out source tree. CI checks out at the tag
  # and the build consumes that tree; no URL/sha256 needed.
  path: ../..

build:
  number: 0
  script:
    # `cargo install --locked` enforces the committed Cargo.lock.
    # `--no-track` skips writing $PREFIX/.crates.toml + .crates2.json
    # (which would pollute the env's metadata).
    # `--bin kitehor` installs only the binary, not other artefacts.
    - cargo install --locked --no-track --bin kitehor --root $PREFIX --path .

requirements:
  build:
    - {{ stdlib('c') }}
    - {{ compiler('c') }}
    - {{ compiler('rust') }}

test:
  commands:
    # Version pin: the binary in the package must report the version
    # we built it for (catches stale lockfile / wrong checkout).
    - kitehor --version | grep -F "{{ version }}"
    - kitehor --help | grep -qi 'kitehor'
    - kitehor kite-periodicity --help | grep -qi 'classify'
    - kitehor analyze --help | grep -qi 'analyze'
    # Functional smoke: simulate a tiny HOR, run analyze end-to-end,
    # confirm the per-stage outputs were written and the summary row
    # exists.
    - kitehor simulate --monomer-size 100 --multiplicity 3 --copies 80
        --sub-rate-intra 0.04 --sub-rate-inter 0.02
        --case-id sim_smoke --out smoke.fa
    - kitehor analyze smoke.fa -o smoke
    - test -s smoke.summary.tsv
    - test -s smoke.verdicts.tsv

about:
  home: https://github.com/kavonrtep/kitehor
  dev_url: https://github.com/kavonrtep/kitehor
  doc_url: https://github.com/kavonrtep/kitehor#readme
  license: MIT OR Apache-2.0
  license_file:
    - LICENSE-MIT
    - LICENSE-APACHE
  summary: >
    Sequence-agnostic Higher-Order Repeat (HOR) detector for tandem-repeat
    array FASTA. Rule-based pipeline on kite k-mer periodograms — no
    supplied monomer consensus, no species library, no neural network.

extra:
  recipe-maintainers:
    - kavonrtep
